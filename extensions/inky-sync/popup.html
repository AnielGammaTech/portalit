<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }
    .header { background: #1e293b; color: white; padding: 14px 16px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header p { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    .body { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 12px; }
    .status.ok { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status.warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .status.err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status.ok .dot { background: #22c55e; }
    .status.warn .dot { background: #f59e0b; }
    .status.err .dot { background: #ef4444; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .results { margin-top: 12px; font-size: 11px; }
    .results .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
    .results .row:last-child { border: none; }
    .results .label { color: #64748b; }
    .results .value { font-weight: 600; color: #1e293b; }
    .results .value.green { color: #16a34a; }
    .results .value.amber { color: #d97706; }
    .note { font-size: 10px; color: #94a3b8; text-align: center; margin-top: 10px; }
    .team-list { max-height: 200px; overflow-y: auto; margin-top: 8px; }
    .team { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; border-bottom: 1px solid #f1f5f9; }
    .team .name { color: #334155; }
    .team .count { color: #16a34a; font-weight: 600; }
    .team .unmatched { color: #d97706; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h1>INKY Sync</h1>
    <p>Sync user counts to PortalIT LootIT</p>
  </div>
  <div class="body">
    <div id="status" class="status warn">
      <div class="dot"></div>
      <span>Open INKY portal to capture session...</span>
    </div>

    <button class="btn btn-primary" id="sync-btn" disabled>Sync User Counts</button>

    <div id="results" class="results" style="display:none;"></div>
    <p class="note">Browse INKY portal first, then click Sync</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
