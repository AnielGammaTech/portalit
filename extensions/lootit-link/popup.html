<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }

    .header { background: #1e293b; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .logo { width: 28px; height: 28px; background: #ec4899; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 16px; }
    .header-text h1 { font-size: 13px; font-weight: 700; color: white; }
    .header-text p { font-size: 10px; color: #94a3b8; }

    .vendor-badge { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #f1f5f9; }
    .vendor-dot { width: 8px; height: 8px; border-radius: 50%; }
    .vendor-dot.active { background: #ec4899; }
    .vendor-dot.inactive { background: #94a3b8; }
    .vendor-name { font-size: 12px; font-weight: 600; color: #1e293b; }
    .vendor-hint { font-size: 10px; color: #94a3b8; margin-left: auto; }

    .body { padding: 12px 16px; }

    .status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 11px; }
    .status.ok { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status.warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .status.err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .status .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status.ok .dot { background: #22c55e; }
    .status.warn .dot { background: #f59e0b; }
    .status.err .dot { background: #ef4444; }

    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-sync { background: #ec4899; color: white; }
    .btn-sync:hover { background: #db2777; }
    .btn-sync:disabled { background: #94a3b8; cursor: not-allowed; }

    .stats { display: flex; gap: 8px; margin: 10px 0; }
    .stat { flex: 1; background: white; border: 1px solid #f1f5f9; border-radius: 8px; padding: 8px; text-align: center; }
    .stat .num { font-size: 18px; font-weight: 700; color: #1e293b; }
    .stat .label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .num.pink { color: #ec4899; }
    .stat .num.green { color: #16a34a; }
    .stat .num.amber { color: #d97706; }

    .team-list { max-height: 220px; overflow-y: auto; margin-top: 8px; border: 1px solid #f1f5f9; border-radius: 8px; background: white; }
    .team { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid #f8fafc; font-size: 11px; }
    .team:last-child { border: none; }
    .team .name { color: #334155; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .team .count { color: #ec4899; font-weight: 700; margin-left: 8px; white-space: nowrap; }
    .team .matched { color: #16a34a; }
    .team .unmatched { color: #d97706; font-style: italic; font-weight: 400; }
    .team select { font-size: 10px; padding: 2px 4px; border: 1px solid #e2e8f0; border-radius: 4px; max-width: 140px; }

    .upload-area { margin-top: 10px; border: 2px dashed #e2e8f0; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .upload-area:hover { border-color: #ec4899; background: #fdf2f8; }
    .upload-area p { font-size: 11px; color: #94a3b8; }
    .upload-area input { display: none; }

    .footer { padding: 8px 16px; text-align: center; }
    .footer a { font-size: 9px; color: #94a3b8; text-decoration: none; }
    .footer a:hover { color: #ec4899; }

    .no-vendor { padding: 24px 16px; text-align: center; }
    .no-vendor p { font-size: 12px; color: #64748b; margin-top: 8px; }
    .no-vendor .big { font-size: 32px; margin-bottom: 4px; }
    .supported { margin-top: 12px; text-align: left; }
    .supported h4 { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
    .supported .vendor-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 11px; color: #475569; }
    .supported .vendor-row .vdot { width: 6px; height: 6px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">L</div>
    <div class="header-text">
      <h1>LootIT Link</h1>
      <p>Vendor data sync</p>
    </div>
  </div>

  <div id="vendor-badge" class="vendor-badge" style="display:none;">
    <div class="vendor-dot active" id="v-dot"></div>
    <span class="vendor-name" id="v-name"></span>
    <span class="vendor-hint" id="v-hint"></span>
  </div>

  <div class="body">
    <div id="status" class="status warn">
      <div class="dot"></div>
      <span>Detecting vendor...</span>
    </div>

    <div id="content"></div>
  </div>

  <div class="footer">
    <a href="https://portalit.gtools.io" target="_blank">PortalIT LootIT</a>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
