<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40">
  <defs>
    <linearGradient id="logobg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#2D1B69"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="0" y="4" width="32" height="32" rx="7" fill="url(#logobg)"/>
  <circle cx="26" cy="10" r="8" fill="#A78BFA" opacity="0.1"/>
  <text x="15" y="24"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="15"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5">PT</text>
  <circle cx="23.5" cy="15" r="2.2" fill="#A78BFA"/>
  <!-- Wordmark (white for dark backgrounds) -->
  <text x="42" y="26"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="18"
    fill="#FFFFFF"
    letter-spacing="-0.3">Portal<tspan fill="#A78BFA">IT</tspan></text>
</svg>
