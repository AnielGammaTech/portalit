<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E0A3C"/>
      <stop offset="100%" stop-color="#2D1B69"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle corner glow -->
  <circle cx="26" cy="6" r="8" fill="#A78BFA" opacity="0.1"/>
  <!-- PT letters -->
  <text x="14.5" y="20"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="15"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5">PT</text>
  <!-- Purple accent dot (the "i" dot) -->
  <circle cx="23.5" cy="11" r="2.2" fill="#A78BFA"/>
</svg>
